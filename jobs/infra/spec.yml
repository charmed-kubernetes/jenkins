meta:
  name: CI Infrastructure
  description: Provides support tasks for maintaining Jenkins
  long-description: |
    ## Ansible

    An Ansible playbook runs every 6 hours on each agent to keep it updated,
    reset to a known-good state, and provision required credentials and tooling.

    The playbook used is located in `jobs/infra/playbook-jenkins.yml`.

    Credentials used in the playbook are pulled from the Jenkins Credentials
    store via the `ci-creds-infra` wrapper (see `jobs/ci-master.yaml`).

    ## Jobs

    - `infra-maintain-{node}` — one per persistent agent; runs local cleanup
      and the Ansible playbook on that agent.
    - `infra-cleanup-clouds` — runs once on any free amd64 large agent;
      purges stale AWS, GCE, and Azure resources created by CI jobs.
  mkdocs:
    destination:
      - "maintenance/infra.md"
    jenkins-job-builder:
      jobs:
        - jobs/ci-master.yaml
        - jobs/infra.yaml
