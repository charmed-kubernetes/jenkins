---
- hosts: all
#  connection: local
  gather_facts: yes
  become: true
  tasks:
    - name: set snap proxies
      shell: |
        snap set system proxy.http="http://egress.ps7.internal:3128"
        snap set system proxy.https="http://egress.ps7.internal:3128"
      tags:
        - adhoc
        - jenkins
    - name: clear homedir
      shell: |
        snap set system homedirs!
      tags:
        - adhoc
        - jenkins
    - sysctl:
        name: net.ipv4.ip_forward
        value: 1
        sysctl_set: yes
        state: present
        reload: yes
      tags:
        - jenkins
    - name: install apt deps
      shell: |
        source /etc/os-release
        apt-get update
        apt-get install -qyf \
          docker.io
        # --- re-enable progressively as jobs require them ---
        # build-essential \
        # fakeroot \
        # cargo \
        # curl \
        # dh-systemd \        # invalid on noble (merged into debhelper)
        # debhelper \
        # default-jre \
        # expect-dev \
        # file \
        # flake8 \
        # gcc \
        # jq \
        # language-pack-en-base \
        # libffi-dev \
        # libffi7 \           # invalid on noble (ships libffi8)
        # libssl-dev \
        # libuv1 \
        # libxml2-dev \
        # make \
        # motd-news-config \
        # parallel \
        # python3-dev \
        # python3-pip \
        # python3-venv \
        # qemu-system \
        # redis-server \
        # snapd \
        # sosreport \
        # squashfuse \
        # strace \
        # tox \
        # tree \
        # ubuntu-dev-tools \
        # ubuntu-server \
        # ubuntu-standard \
        # unzip \
        # uuid \
        # virtualenv \
        # wget \
        # zlib1g-dev \
        # tmpreaper \
        # awscli
      tags:
        - jenkins
      ignore_errors: yes
    - name: remove unused debs
      shell: |
        # --- re-enable progressively if a job needs these gone ---
        # sudo apt-get remove -qyf \
        #   golang \
        #   python-pip \
        #   juju \
        #   juju-wait \
        #   lxd \
        #   lxd-client \
        #   lxcfs \
        #   lxc-common \
        #   liblxc1 \
        #   libsodium-dev \
        #   snapcraft
        true
      tags:
        - jenkins
      ignore_errors: yes
    - name: upgrade snapd
      # command: "snap refresh snapd --channel latest/stable"
      command: "true"
      ignore_errors: yes
      tags:
        - jenkins
        - adhoc
    - name: upgrade charm
      # command: "snap refresh charm --channel 3.x/stable"
      command: "true"
      ignore_errors: yes
      tags:
        - jenkins
        - adhoc
    - name: upgrade juju
      # command: "snap refresh juju --channel 3/stable"
      command: "true"
      ignore_errors: yes
      tags:
        - jenkins
        - adhoc
    - name: upgrade charmcraft
      # command: "snap refresh charmcraft --channel 2.x/stable --classic"
      command: "true"
      ignore_errors: yes
      tags:
        - jenkins
        - adhoc
    - name: upgrade snapcraft
      command: "snap refresh snapcraft --channel 6.x/stable"
      ignore_errors: yes
      tags:
        - jenkins
        - adhoc
    - name: upgrade google-cloud-cli
      # command: "snap refresh google-cloud-cli --channel latest/stable"
      command: "true"
      ignore_errors: yes
      tags:
        - jenkins
        - adhoc
    - name: install snap deps
      command: "snap install {{item}}"
      ignore_errors: yes
      loop:
        - "lxd"
        # --- re-enable progressively as jobs require them ---
        # - "charm --classic --channel 3.x/stable"
        # - "charmcraft --classic --channel 2.x/stable"
        # - "go --classic --stable"
        # - "google-cloud-cli --classic --channel latest/stable"
        # - "juju --channel=3/stable"
        # - "juju-crashdump --classic --edge"
        # - "juju-wait --classic"
        # - "kubectl --classic"
        # - "multipass"
        # - "yq"
        - "snapcraft --classic"
      tags:
        - jenkins
        - adhoc
    - name: remove unneeded snaps
      shell: |
        # --- re-enable progressively if a job needs these gone ---
        # snap remove aws-cli
        # snap remove microk8s
        # snap remove bundletester
        # snap remove surl
        true
      ignore_errors: yes
      tags:
        - jenkins
    - name: copy bashrc
      copy:
        src: "fixtures/bashrc"
        dest: /var/lib/jenkins/.bashrc
        owner: root
        group: root
        mode: 0644
        force: yes
      tags:
        - jenkins
    - name: create snapcraft config dir
      file:
        path: /var/lib/jenkins/.config/snapcraft
        state: directory
        owner: root
        group: root
        mode: 0755
      tags:
        - jenkins
    - name: Creates ssh dir
      file:
        path: /var/lib/jenkins/.ssh
        state: directory
      tags:
        - jenkins
    - name: ssh config
      template:
        src: "fixtures/ssh_config"
        dest: /var/lib/jenkins/.ssh/config
        owner: root
        group: root
        mode: 0644
        force: yes
      tags:
        - jenkins
    - name: copy charm creds
      copy:
        src: "{{ lookup('env', 'CHARMCREDS') }}"
        dest: /var/lib/jenkins/.go-cookies
        owner: root
        group: root
        mode: 0644
        force: no
      become: false
      tags:
        - jenkins
    # NOTE: (mateo) host-level snapstore login removed — snap-build jobs authenticate
    # in-container using their own pinned snapcraft version (6.x/7.x/8.x) via
    # `snapcraft login --with`. The creds staged below are pushed into those
    # containers by build-release-cdk-addons.groovy, build-release-eks-snaps.groovy,
    # and release-microk8s.yaml at job runtime. Do not add a host login here.
    - name: copy snapcraft creds
      copy:
        src: "{{ lookup('env', 'SNAPCRAFTCREDS') }}"
        dest: /var/lib/jenkins/snapcraft-creds
        owner: root
        group: root
        mode: 0644
        force: yes
      tags:
        - jenkins
    - name: copy ssh creds
      copy:
        src: "{{ lookup('env', 'CDKBOTSSHCREDS') }}"
        dest: /var/lib/jenkins/.ssh/cdkbot_rsa
        owner: root
        group: root
        mode: 0600
        force: yes
      tags:
        - jenkins
    - name: copy snapcraft cpc creds
      copy:
        src: "{{ lookup('env', 'SNAPCRAFTCPCCREDS') }}"
        dest: /var/lib/jenkins/.config/snapcraft/snapcraft-cpc.cfg
        owner: root
        group: root
        mode: 0644
        force: yes
      tags:
        - jenkins
    - name: create aws dir
      file:
        path: /var/lib/jenkins/.aws
        state: directory
        owner: root
        group: root
        mode: 0755
      tags:
        - jenkins
    - name: copy aws creds
      copy:
        src: "{{ lookup('env', 'AWSCREDS') }}"
        dest: /var/lib/jenkins/.aws/credentials
        owner: root
        group: root
        mode: 0644
        force: yes
      tags:
        - jenkins
    - name: create surl dir
      file:
        path: /var/lib/jenkins/snap/surl/common
        state: directory
        owner: root
        group: root
        mode: 0755
      tags:
        - jenkins
    - name: copy surl creds
      copy:
        src: "{{ lookup('env', 'SURLCREDS') }}"
        dest: /var/lib/jenkins/snap/surl/common/production-creds.surl
        owner: root
        group: root
        mode: 0644
        force: yes
      tags:
        - jenkins
    - name: create juju dir
      file:
        path: /var/lib/jenkins/.local/share/juju
        state: directory
        mode: 0755
      tags:
        - jenkins
    - name: copy juju credentials
      unarchive:
        src: "{{ lookup('env', 'JUJUCREDS') }}"
        dest: /var/lib/jenkins/.local/share/juju
      tags:
        - jenkins
    - name: copy juju clouds
      unarchive:
        src: "{{ lookup('env', 'JUJUCLOUDS') }}"
        dest: /var/lib/jenkins/.local/share/juju
      tags:
        - jenkins
    - name: copy sso creds
      copy:
        src: "{{ lookup('env', 'SSOCREDS') }}"
        dest: /var/lib/jenkins/.local/share/juju/store-usso-token
        owner: root
        group: root
        mode: 0644
      tags:
        - jenkins
    - name: copy gpg public key
      copy:
        src: "{{ lookup('env', 'K8STEAMCI_GPG_PUB') }}"
        dest: /var/lib/jenkins/gpg-pub.key
        owner: root
        group: root
        mode: 0644
      tags:
        - jenkins
    - name: copy gpg private key
      copy:
        src: "{{ lookup('env', 'K8STEAMCI_GPG_PRIVATE') }}"
        dest: /var/lib/jenkins/gpg-private.key
        owner: root
        group: root
        mode: 0644
      tags:
        - jenkins
    - name: import gpg keys
      ignore_errors: yes
      shell: |
        gpg --import gpg-pub.key
        gpg --import gpg-private.key
    - name: set perms
      file:
        path: /var/lib/jenkins/.local/share/juju
        owner: root
        group: root
        recurse: yes
      tags:
        - jenkins

    - name: setup lxd network
      command: "/snap/bin/lxd init --auto"
      tags:
        - jenkins
      ignore_errors: yes
    - name: disable ipv6 in lxd
      command: "lxc network set {{item}} ipv6.address none"
      ignore_errors: yes
      loop:
        - 'lxdbr0'
        - 'lxdbr1'
      tags:
        - adhoc
        - jenkins
    - name: set lxd proxy
      shell: |
        lxc config set core.proxy_http http://egress.ps7.internal:3128
        lxc config set core.proxy_https http://egress.ps7.internal:3128
        lxc config set core.proxy_ignore_hosts localhost
      tags:
        - adhoc
        - jenkins
    - name: set docker daemon config
      copy:
        src: "fixtures/docker.daemon.json"
        dest: /etc/docker/daemon.json
        force: yes
        owner: root
        group: root
      tags:
        - adhoc
        - jenkins
    - name: restart docker service
      service:
        name: docker
        state: restarted
      tags:
        - adhoc
        - jenkins
    - name: create scapestack dir
      file:
        path: /var/lib/jenkins/.scapestack
        state: directory
        owner: root
        group: root
        mode: 0755
      tags:
        - jenkins
    - name: copy scapestack creds
      copy:
        src: "{{ lookup('env', 'SCAPESTACKCREDS') }}"
        dest: /var/lib/jenkins/.scapestack/scapestack-creds
        owner: root
        group: root
        mode: 0644
      tags:
        - jenkins
    - name: copy scapestack cloud creds
      copy:
        src: "{{ lookup('env', 'SCAPESTACKCLOUD') }}"
        dest: /var/lib/jenkins/.scapestack/scapestack-cloud
        owner: root
        group: root
        mode: 0644
      tags:
        - jenkins
    - name: copy openstack creds
      copy:
        src: "{{ lookup('env', 'OPENSTACK_CREDS') }}"
        dest: /var/lib/jenkins/openstack-creds
        owner: root
        group: root
        mode: 0644
      tags:
        - jenkins
    - name: make sure workspace permissions are correct
      file:
        path: /var/lib/jenkins/slaves
        owner: root
        group: root
        recurse: yes
      ignore_errors: yes
      tags:
        - jenkins
    - name: make sure docker.sock permissions are correct
      file:
        path: /var/run/docker.sock
        owner: root
        group: docker
        mode: 0666
      ignore_errors: yes
      tags:
        - adhoc
        - jenkins
